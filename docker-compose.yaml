services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: idplite
      POSTGRES_USER: idplite
      POSTGRES_PASSWORD: idplite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U idplite" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://idplite:idplite@postgres:5432/idplite
      SECRET_KEY: dev-secret-key-change-in-prod
      CALLBACK_SECRET: dev-callback-secret
      # Pulled from a root .env file if present (docker
      # compose auto-loads it), otherwise falls back to empty/localhost.
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:8000/auth/github/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ui:
    build: ./ui
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./ui/src:/app/src
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data: